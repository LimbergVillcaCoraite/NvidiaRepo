name: Auto Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy on push to main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server (remote script)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_REPO_PATH: ${{ secrets.REMOTE_REPO_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" \
            "bash ${REMOTE_REPO_PATH}/scripts/deploy.sh ${REMOTE_REPO_PATH} main"

      - name: Run smoke tests (public)
        run: |
          echo "Checking public health endpoint..."
          curl -fS https://statusnvidia.duckdns.org/api/health | jq .
