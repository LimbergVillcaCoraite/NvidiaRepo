services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nvidiarepo-backend
    environment:
      FRONTEND_ORIGIN: http://localhost:8080
      DATABRICKS_PROFILE: ${DATABRICKS_PROFILE:-}
      DATABRICKS_HOST: ${DATABRICKS_HOST:-}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
      DATABRICKS_WAREHOUSE_ID: ${DATABRICKS_WAREHOUSE_ID:-c1790544d31644c6}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: nvidiarepo-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
