services:
  caddy:
    image: caddy:2.8-alpine
    container_name: nvidiarepo-caddy
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nvidiarepo-backend
    env_file:
      - .env
    environment:
      ALLOWED_HOSTS: localhost,127.0.0.1,statusnvidia.duckdns.org
      FRONTEND_ORIGINS: https://statusnvidia.duckdns.org,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: nvidiarepo-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
